apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: w11
nodes:
  - role: control-plane
    image: kindest/node:v1.31.0
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true,role=control-plane"
    extraPortMappings:
      - containerPort: 30090
        hostPort: 30090
        protocol: TCP
      - containerPort: 30903
        hostPort: 30903
        protocol: TCP
      - containerPort: 30900
        hostPort: 30900
        protocol: TCP
  - role: worker
    image: kindest/node:v1.31.0
    labels:
      role: worker
      pool: general
  - role: worker
    image: kindest/node:v1.31.0
    labels:
      role: worker
      pool: general
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/16"
