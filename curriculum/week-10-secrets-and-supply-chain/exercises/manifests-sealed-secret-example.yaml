# A sample SealedSecret manifest.
#
# In a real workflow, you do NOT hand-write SealedSecrets. You run:
#   kubectl create secret generic api-token --from-literal=token=actual-value \
#     --dry-run=client -o yaml \
#     | kubeseal --format yaml > manifests-sealed-secret.yaml
#
# The output is what you commit. The structure below is the *shape* of that
# output; the `encryptedData` values are placeholders that will not actually
# decrypt. Replace them by running kubeseal against your live cluster.
#
# Reference: https://github.com/bitnami-labs/sealed-secrets
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: api-token
  namespace: default
spec:
  encryptedData:
    token: "AgBy3i4OJSWK+PiTySYZZA9rO43cGDEQAx..."
  template:
    metadata:
      name: api-token
      namespace: default
    type: Opaque
