# External Secrets Operator wiring for Week 10 Exercise 2.
#
# Assumes:
#   - External Secrets Operator is installed via Helm in the `external-secrets`
#     namespace (helm install external-secrets external-secrets/external-secrets
#     -n external-secrets --create-namespace --version 0.10.x).
#   - Vault is running in the `vault` namespace per manifests-vault-dev.yaml.
#   - Vault's Kubernetes auth method has been configured with a role named
#     `eso-myapp` bound to the ServiceAccount default/secret-consumer.
#
# CRD API: external-secrets.io/v1 (GA in ESO 0.10).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-consumer
  namespace: default
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-myapp"
          serviceAccountRef:
            name: secret-consumer
            namespace: default
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: myapp-db
  namespace: default
spec:
  refreshInterval: "30s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: myapp-db
    creationPolicy: Owner
  data:
    - secretKey: db-username
      remoteRef:
        key: myapp/db
        property: username
    - secretKey: db-password
      remoteRef:
        key: myapp/db
        property: password
    - secretKey: db-host
      remoteRef:
        key: myapp/db
        property: host
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-consumer
  namespace: default
  labels:
    app: secret-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-consumer
  template:
    metadata:
      labels:
        app: secret-consumer
    spec:
      serviceAccountName: secret-consumer
      containers:
        - name: app
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command: ["python3", "/app/secret_consumer.py"]
          env:
            - name: SECRETS_DIR
              value: "/etc/secrets"
            - name: PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: secrets
              mountPath: /etc/secrets
              readOnly: true
            - name: code
              mountPath: /app
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: secrets
          secret:
            secretName: myapp-db
        - name: code
          configMap:
            name: secret-consumer-code
            items:
              - key: secret_consumer.py
                path: secret_consumer.py
---
apiVersion: v1
kind: Service
metadata:
  name: secret-consumer
  namespace: default
spec:
  type: NodePort
  selector:
    app: secret-consumer
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
