# kind cluster config for Week 9.
# Create the cluster with: kind create cluster --config kind-w09.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: w09
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
